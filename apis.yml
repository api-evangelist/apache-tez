aid: apache-tez
name: Apache Tez
description: >-
  Apache Tez is an application framework that allows for complex directed-acyclic-graph (DAG)
  based processing of data built on Apache Hadoop YARN. It is designed as a successor to
  MapReduce for executing Hive and Pig queries, providing a flexible API for creating DAG
  execution pipelines, in-memory data passing between tasks, and session reuse for reduced
  startup latency. Apache Tez is an Apache Software Foundation top-level project.
type: Index
position: Consumer
access: 3rd-Party
